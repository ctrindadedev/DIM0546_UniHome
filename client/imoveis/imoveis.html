<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Buscar Imóveis - UniHome</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../shared/global.css" />
    <link rel="stylesheet" href="imoveis.css" />
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <a href="../home/home.html" class="logo"
          ><span class="logo-mark">U</span> UniHome</a
        >
        <nav class="sidebar-nav">
          <a href="../dashboard/dashboard.html"
            ><span class="icon">🏠</span> Início</a
          >
          <a href="imoveis.html" class="active"
            ><span class="icon">🏢</span> Buscar Imóveis</a
          >
          <a href="../matches/matches.html"
            ><span class="icon">🤝</span> Achar Colegas</a
          >
          <a href="#"><span class="icon">💬</span> Meus Grupos</a>
          <a href="../perfil/perfil.html"
            ><span class="icon">⚙️</span> Meu Perfil</a
          >
        </nav>
      </aside>
      <main class="app-main">
        <header class="app-header">
          <button class="menu-toggle" data-menu-toggle>☰</button>
          <div class="search-bar">
            <span>🔍</span>
            <input
              type="text"
              placeholder="Endereço, bairro, universidade..."
            />
          </div>
          <div class="avatar-wrap">
            <img
              src="https://i.pravatar.cc/100?img=12"
              class="avatar"
              data-avatar-toggle
              alt=""
            />
            <div class="dropdown" id="user-dropdown">
              <a href="../perfil/perfil.html">Meu Perfil</a>
              <a href="#">Configurações</a>
              <hr />
              <a href="../home/home.html">Sair</a>
            </div>
          </div>
        </header>
        <div class="app-content">
          <div class="page-head">
            <h1>Imóveis disponíveis</h1>
            <p>Encontre o lugar ideal perto da sua faculdade.</p>
          </div>
          <div class="layout-with-sidebar">
            <aside class="filters">
              <h3>Filtros</h3>
              <div class="filter-group">
                <label>Preço Máximo</label>
                <input type="number" placeholder="R$ 2.500" value="2500" />
              </div>
              <div class="filter-group">
                <label>Nº de quartos</label>
                <select>
                  <option>Qualquer</option>
                  <option>1</option>
                  <option>2</option>
                  <option>3</option>
                  <option>4+</option>
                </select>
              </div>
              <div class="filter-group">
                <label>Proximidade da Universidade</label>
                <select>
                  <option>Até 1 km</option>
                  <option>Até 3 km</option>
                  <option>Até 5 km</option>
                  <option>Qualquer</option>
                </select>
              </div>
              <div class="filter-group">
                <label>Tipo</label>
                <select>
                  <option>Todos</option>
                  <option>Apartamento</option>
                  <option>Casa</option>
                  <option>Kitnet</option>
                  <option>República</option>
                </select>
              </div>
              <button class="btn btn-primary btn-block" data-filter-apply>
                Aplicar Filtros
              </button>
            </aside>
            <div class="grid grid-3" id="properties"></div>
          </div>
        </div>
      </main>
    </div>

    <script src="../shared/main.js"></script>
    <script src="imoveis.js"></script>
  </body>
</html>
